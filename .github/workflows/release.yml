name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install analysis tools
        run: python -m pip install --upgrade pip ruff bandit

      - name: Check Python syntax
        run: python -m compileall -q generate_short.py run_pipeline.py setup_channel.py upload_youtube.py test_voice.py

      - name: Run Ruff
        run: ruff check --output-format=github .

      - name: Run Bandit
        run: bandit -q -r . --severity-level medium --confidence-level high -x ./.git,./.venv,./outputs,./voices,./assets/music

      - name: Resolve version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Version must look like v0.1.0 or v0.1.0-rc.1" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          prefix="finance-shorts-factory-${RELEASE_VERSION}/"
          git archive --format=zip --prefix="$prefix" HEAD -o "dist/finance-shorts-factory-${RELEASE_VERSION}.zip"
          git archive --format=tar.gz --prefix="$prefix" HEAD -o "dist/finance-shorts-factory-${RELEASE_VERSION}.tar.gz"
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Finance Shorts Factory ${{ env.RELEASE_VERSION }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(env.RELEASE_VERSION, '-') }}
          generate_release_notes: true
          files: |
            dist/finance-shorts-factory-${{ env.RELEASE_VERSION }}.zip
            dist/finance-shorts-factory-${{ env.RELEASE_VERSION }}.tar.gz
            dist/SHA256SUMS.txt
