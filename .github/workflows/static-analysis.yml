name: Static analysis

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - master
  pull_request:
    branches:
      - development
      - master

permissions:
  contents: read

concurrency:
  group: static-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python syntax and static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install analysis tools
        run: python -m pip install --upgrade pip ruff bandit

      - name: Check Python syntax
        run: python -m compileall -q generate_short.py run_pipeline.py setup_channel.py upload_youtube.py test_voice.py

      - name: Run Ruff
        run: ruff check --output-format=github .

      - name: Run Bandit
        run: bandit -q -r . --severity-level medium --confidence-level high -x ./.git,./.venv,./outputs,./voices,./assets/music
